<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel-Spectrum-Overlay</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <!-- Canvas do wizualizacji -->
        <canvas id="visualizer-canvas"></canvas>

        <!-- Wskaźnik Click-through -->
        <div id="click-through-indicator" class="hidden" title="Tryb click-through aktywny">🖱️</div>

        <!-- Tooltip powitalny -->
        <div id="welcome-tooltip" class="hidden">
            Przeciągnij aby ustawić pozycję. Prawy przycisk aby skonfigurować.
        </div>

        <!-- Nakładka do przeciągania okna -->
        <div id="controls-overlay"></div>
    </div>

    <script src="themes.js"></script>
    <script src="visualizer.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
